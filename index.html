<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Babloon</title>

    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: "Helvetica Neue", Arial, sans-serif;
            overflow: hidden;
        }

        .hero {
            position: relative;
            width: 100vw;
            height: 100vh;
            background: url("babloon.jpeg") no-repeat center center/cover;
        }

        .overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            color: white;
            text-shadow: 0 4px 20px rgba(0,0,0,0.6);
        }

        h1 {
            font-size: 4rem;
            margin: 0;
            letter-spacing: 2px;
        }

        h2 {
            font-size: 1.5rem;
            font-weight: 300;
            margin-top: 10px;
        }

        @media (max-width: 600px) {
            h1 { font-size: 2.5rem; }
            h2 { font-size: 1.1rem; }
        }
    </style>
</head>

<body>
    <div class="hero">
        <div class="overlay">
            <h1>Babloon</h1>
            <h2>Where impossible dreams come to life</h2>
        </div>
    </div>
</body>
</html>
