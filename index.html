<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday Leonie&#33;</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: radial-gradient(circle at center, #2e004b 0%, #000000 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
        }

        #card-container {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            z-index: 10;
            pointer-events: none;
            width: 100%;
        }

        h1 {
            font-size: 4rem;
            margin-bottom: 0.5rem;
            text-shadow: 0 0 20px #ff00de, 0 0 30px #ff00de;
            animation: pulse 2s infinite ease-in-out;
        }

        .age {
            font-size: 10rem;
            font-weight: bold;
            display: block;
            background: linear-gradient(to bottom, #fff, #ff77e9);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 15px rgba(255, 255, 255, 0.5));
            animation: pulse 1.5s infinite ease-in-out, colorShift 5s infinite linear;
        }

        canvas {
            display: block;
            position: absolute;
            top: 0;
            left: 0;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        @keyframes colorShift {
            from { filter: drop-shadow(0 0 15px rgba(255, 255, 255, 0.5)) hue-rotate(0deg); }
            to { filter: drop-shadow(0 0 15px rgba(255, 255, 255, 0.5)) hue-rotate(360deg); }
        }
    </style>
</head>
<body>
    <canvas id="fireworksCanvas"></canvas>

    <div id="card-container">
        <h1>Happy Birthday Leonie&#33;</h1>
        <span class="age">19</span>
    </div>

    <script>
        const canvas = document.getElementById('fireworksCanvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        let balloons = [];

        // Audio setup for procedural "pop" sound
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        const audioCtx = new AudioContext();

        function playPopSound() {
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
            const oscillator = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();

            oscillator.type = 'sine';
            oscillator.frequency.setValueAtTime(600, audioCtx.currentTime);
            oscillator.frequency.exponentialRampToValueAtTime(10, audioCtx.currentTime + 0.1);

            gainNode.gain.setValueAtTime(0.3, audioCtx.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);

            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);

            oscillator.start();
            oscillator.stop(audioCtx.currentTime + 0.1);
        }

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        class Particle {
            constructor(x, y, color) {
                this.x = x;
                this.y = y;
                this.color = color;
                this.velocity = {
                    x: (Math.random() - 0.5) * 8,
                    y: (Math.random() - 0.5) * 8
                };
                this.alpha = 1;
                this.friction = 0.97;
            }

            draw() {
                ctx.save();
                ctx.globalAlpha = this.alpha;
                ctx.beginPath();
                ctx.arc(this.x, this.y, 2, 0, Math.PI * 2, false);
                ctx.fillStyle = this.color;
                ctx.fill();
                ctx.restore();
            }

            update() {
                this.velocity.x *= this.friction;
                this.velocity.y *= this.friction;
                this.x += this.velocity.x;
                this.y += this.velocity.y;
                this.alpha -= 0.01;
            }
        }

        class UnicornBalloon {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = canvas.height + 50;
                this.speed = Math.random() * 2 + 1;
                this.baseSize = Math.random() * 20 + 30;
                this.size = this.baseSize;
                this.angle = Math.random() * Math.PI * 2;
                this.isPopped = false;
                const balloonColors = ['rgba(255, 100, 200, 0.5)', 'rgba(180, 100, 255, 0.5)', 'rgba(100, 220, 255, 0.5)'];
                this.color = balloonColors[Math.floor(Math.random() * balloonColors.length)];
            }

            update() {
                this.y -= this.speed;
                this.x += Math.sin(this.y / 50) * 0.5; // Slight sway

                // Expand once over the header (approx 45% of height)
                if (this.y < canvas.height * 0.45) {
                    this.size += 0.5;
                }

                // Pop near the top
                if (this.y < 50) {
                    this.isPopped = true;
                    playPopSound();
                    createFirework(this.x, this.y);
                }
            }

            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                
                const balloonWidth = this.size * 1.2;
                const balloonHeight = this.size * 1.5;
                const centerX = 0;
                const centerY = -balloonHeight / 2;

                // Create a 3D radial gradient to simulate light hitting a sphere
                const gradient = ctx.createRadialGradient(
                    -balloonWidth * 0.15, -balloonHeight * 0.7, balloonWidth * 0.05, // Light source position
                    centerX, centerY, balloonHeight / 2                             // Balloon outer boundary
                );
                
                gradient.addColorStop(0, 'rgba(255, 255, 255, 0.9)');         // The shiny highlight
                gradient.addColorStop(0.2, this.color.replace('0.5', '0.8')); // The main balloon color
                gradient.addColorStop(1, this.color.replace('0.5', '1.0'));   // The darker shaded edge

                // Draw the balloon body
                ctx.beginPath();
                ctx.ellipse(centerX, centerY, balloonWidth / 2, balloonHeight / 2, 0, 0, Math.PI * 2);
                ctx.fillStyle = gradient;
                ctx.fill();

                // Draw the balloon knot
                ctx.beginPath();
                ctx.fillStyle = this.color.replace('0.5', '1.0'); // Solid color for the knot
                ctx.moveTo(0, 0);
                ctx.lineTo(-5, -5);
                ctx.lineTo(5, -5);
                ctx.fill();

                // Draw Unicorn drawn on the balloon
                ctx.font = `${this.size * 0.8}px serif`;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText('🦄', 0, -balloonHeight / 2);

                // Draw balloon string
                ctx.beginPath();
                ctx.moveTo(0, 0);
                for (let i = 1; i <= 8; i++) {
                    const segmentY = i * 7.5; // Distributes segments over a 60px length
                    const segmentX = Math.sin((this.y + segmentY * 2) / 15) * (i * 1.5);
                    ctx.lineTo(segmentX, segmentY);
                }
                ctx.strokeStyle = 'rgba(255, 255, 255, 0.5)';
                ctx.lineWidth = 1;
                ctx.stroke();
                
                ctx.restore();
            }
        }

        function createFirework(x, y) {
            const colors = ['#ff00de', '#ff77e9', '#00d4ff', '#ffffff', '#ffff00'];
            const color = colors[Math.floor(Math.random() * colors.length)];
            for (let i = 0; i < 40; i++) {
                particles.push(new Particle(x, y, color));
            }
        }

        function animate() {
            requestAnimationFrame(animate);
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            particles.forEach((particle, i) => {
                if (particle.alpha > 0) {
                    particle.update();
                    particle.draw();
                } else {
                    particles.splice(i, 1);
                }
            });

            balloons.forEach((balloon, i) => {
                balloon.update();
                balloon.draw();
                if (balloon.isPopped) {
                    balloons.splice(i, 1);
                }
            });

            if (Math.random() < 0.05) {
                createFirework(Math.random() * canvas.width, Math.random() * canvas.height * 0.7);
            }
        }

        function createUnicorn() {
            if (balloons.length < 3) {
                balloons.push(new UnicornBalloon());
            }
        }

        // Spawn unicorns periodically
        setInterval(createUnicorn, 1500);

        // Also launch firework on click
        canvas.addEventListener('mousedown', (e) => {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            createFirework(e.clientX, e.clientY);
        });

        animate();
    </script>
</body>
</html>
